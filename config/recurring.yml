# Solid Queue recurring tasks
# https://github.com/rails/solid_queue#recurring-tasks

production:
  daily_streak_reset:
    class: DailyStreakCheckJob
    queue: low
    schedule: every day at 6am UTC
  session_cleanup:
    class: Core::SessionCleanupJob
    queue: low
    schedule: every day at 3am UTC
  cost_alert_check:
    class: AiOrchestrator::CostAlertJob
    queue: default
    schedule: every hour

development:
  daily_streak_reset:
    class: DailyStreakCheckJob
    queue: low
    schedule: every day at 6am UTC
  session_cleanup:
    class: Core::SessionCleanupJob
    queue: low
    schedule: every day at 3am UTC
  cost_alert_check:
    class: AiOrchestrator::CostAlertJob
    queue: default
    schedule: every hour
