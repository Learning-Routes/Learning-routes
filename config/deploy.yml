# Kamal 2 Deployment Configuration
# https://kamal-deploy.org

service: learning_routes
image: gilberga/learning_routes

servers:
  web:
    hosts:
      - 178.156.240.166
    options:
      memory: 512m
  job:
    hosts:
      - 178.156.240.166
    cmd: bin/jobs
    options:
      memory: 512m

proxy:
  ssl: true
  host: learningroutes.com,learning-routes.com
  app_port: 80
  healthcheck:
    interval: 3
    path: /up
    timeout: 60

registry:
  server: registry.hub.docker.com
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    # Production DB uses explicit host/port/user/db in database.yml; only the
    # password is ship-as-secret. The rest is non-sensitive and hardcoded.
    - POSTGRES_PASSWORD
    - RESEND_API_KEY
    - OPENAI_API_KEY
    - ELEVENLABS_API_KEY
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
  clear:
    RAILS_LOG_LEVEL: info
    RAILS_SERVE_STATIC_FILES: "true"
    # WEB_CONCURRENCY: set to "auto" to use all available CPUs (or specify explicit count)
    WEB_CONCURRENCY: auto
    # Pool size for both Puma and Solid Queue workers. Must be ≥ the largest
    # worker thread count + a small buffer. The ai_requests pool uses 8 threads,
    # so 12 leaves headroom for Solid Queue's dispatcher/control threads.
    RAILS_MAX_THREADS: "12"
    CORS_ORIGINS: "learningroutes.com,www.learningroutes.com,learning-routes.com,www.learning-routes.com"
    # Enable Puma plugins for better GC and memory efficiency
    SOLID_QUEUE_IN_PUMA: "false"

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"
  pg-shell: accessory exec postgres --interactive --reuse "psql -U learning_routes learning_routes_production"

asset_path: /rails/public/assets

builder:
  arch: amd64

# Self-hosted Postgres on the same Hetzner box as the app.
# Replaces Neon. App reaches it over Kamal's internal Docker network at
# hostname `learning_routes-postgres` (set automatically: service-accessory).
# Port is bound to 127.0.0.1 only — not reachable from the public internet.
# Data persists in a Docker volume named `learning_routes-postgres-data`.
accessories:
  postgres:
    image: postgres:16
    host: 178.156.240.166
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: learning_routes
        POSTGRES_DB: learning_routes_production
      secret:
        - POSTGRES_PASSWORD
    files:
      - config/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    directories:
      - data:/var/lib/postgresql/data
