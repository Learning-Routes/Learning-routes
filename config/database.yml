# PostgreSQL configuration for Learning Routes
# https://guides.rubyonrails.org/configuring.html#configuring-a-database

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>

development:
  primary:
    <<: *default
    database: learning_routes_development
  cache:
    <<: *default
    database: learning_routes_development_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: learning_routes_development_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: learning_routes_development_cable
    migrations_paths: db/cable_migrate

test:
  primary:
    <<: *default
    database: learning_routes_test
  cache:
    <<: *default
    database: learning_routes_test_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: learning_routes_test_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: learning_routes_test_cable
    migrations_paths: db/cable_migrate

production:
  # Self-hosted Postgres (Kamal accessory `learning_routes-postgres` on the same
  # Hetzner box, internal Docker network only). Explicit host/port/credentials
  # rather than url: — Ruby's URI parser stricter-validates hostnames in some
  # code paths (db:prepare's resolver) and rejects the underscore that Kamal
  # bakes into the accessory hostname.
  primary: &primary_production
    adapter: postgresql
    encoding: unicode
    host: <%= ENV.fetch("POSTGRES_HOST", "learning_routes-postgres") %>
    port: <%= ENV.fetch("POSTGRES_PORT", 5432) %>
    username: <%= ENV.fetch("POSTGRES_USER", "learning_routes") %>
    password: <%= ENV["POSTGRES_PASSWORD"] %>
    database: learning_routes_production
    pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  cache:
    <<: *primary_production
    database: learning_routes_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: learning_routes_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: learning_routes_production_cable
    migrations_paths: db/cable_migrate
